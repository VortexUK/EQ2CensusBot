[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]

[phases.install]
env = { PIP_BREAK_SYSTEM_PACKAGES = "1" }
cmds = [
  "python3.11 -m ensurepip --upgrade",
  "python3.11 -m pip install -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "python main.py"
