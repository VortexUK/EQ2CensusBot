<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background tile -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>

  <!-- Sword blade -->
  <polygon points="16,2 17.2,17 14.8,17" fill="#c8a96e"/>
  <!-- Blade fuller (centre groove highlight) -->
  <polygon points="16,3.5 16.45,15.5 15.55,15.5" fill="#e8c98e" opacity="0.55"/>

  <!-- Crossguard -->
  <rect x="9" y="17" width="14" height="2.8" rx="1.2" fill="#c8a96e"/>
  <!-- Crossguard centre gem -->
  <circle cx="16" cy="18.4" r="1.4" fill="#1a1020"/>
  <circle cx="16" cy="18.4" r="0.85" fill="#9b6fff" opacity="0.9"/>

  <!-- Grip -->
  <rect x="14.7" y="19.8" width="2.6" height="7.2" rx="1" fill="#8a6a3a"/>
  <!-- Grip wrap lines -->
  <line x1="14.7" y1="21.8" x2="17.3" y2="21.8" stroke="#c8a96e" stroke-width="0.5" opacity="0.6"/>
  <line x1="14.7" y1="23.6" x2="17.3" y2="23.6" stroke="#c8a96e" stroke-width="0.5" opacity="0.6"/>
  <line x1="14.7" y1="25.4" x2="17.3" y2="25.4" stroke="#c8a96e" stroke-width="0.5" opacity="0.6"/>

  <!-- Pommel -->
  <ellipse cx="16" cy="27.8" rx="2.8" ry="1.8" fill="#c8a96e"/>
  <ellipse cx="16" cy="27.8" rx="1.4" ry="0.9" fill="#a07840" opacity="0.6"/>
</svg>
