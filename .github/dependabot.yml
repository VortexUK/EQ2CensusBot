# Weekly dependency-update PRs. Three ecosystems: the Python backend
# (uv, reads pyproject.toml + uv.lock), the React frontend (npm), and
# the GitHub Actions used in our workflows.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    # vite, its plugins, and vitest share peer-dependency constraints —
    # e.g. @vitejs/plugin-react@6 requires a newer vite, and vite@8 is
    # rejected as a peer by plugin-react@4. Bumping them in separate PRs
    # produces unmergeable ERESOLVE failures, so group the whole vite
    # ecosystem into a single coordinated PR.
    groups:
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
      include: "scope"
